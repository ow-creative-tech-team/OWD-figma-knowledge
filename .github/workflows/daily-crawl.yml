name: Daily Figma Docs Crawl

on:
  schedule:
    # Runs every day at 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch: # allow manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          git init "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git remote add origin "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          AUTH_HEADER="$(printf "x-access-token:%s" "$GH_TOKEN" | base64 | tr -d '\n')"
          git config --local "http.${GITHUB_SERVER_URL}/.extraheader" "AUTHORIZATION: basic ${AUTH_HEADER}"

          if [[ "$GITHUB_REF" == refs/heads/* ]]; then
            BRANCH="${GITHUB_REF#refs/heads/}"
            git fetch --no-tags --prune --depth=1 origin "+${GITHUB_REF}:refs/remotes/origin/${BRANCH}"
            git checkout -B "$BRANCH" "refs/remotes/origin/${BRANCH}"
            git branch --set-upstream-to="origin/${BRANCH}" "$BRANCH"
          else
            git fetch --no-tags --prune --depth=1 origin "$GITHUB_SHA"
            git checkout --force "$GITHUB_SHA"
          fi

      - name: Select Node.js runtime
        run: |
          set -euo pipefail

          if [ -d /opt/hostedtoolcache/node ]; then
            NODE_BIN="$(
              find /opt/hostedtoolcache/node -path "*/x64/bin/node" -type f | sort -V | while read -r node_bin; do
                version="$("$node_bin" -p "process.versions.node")"
                IFS=. read -r major minor patch <<< "$version"
                if (( major > 20 || (major == 20 && (minor > 18 || (minor == 18 && patch >= 1))) )); then
                  echo "$node_bin"
                fi
              done | tail -n 1
            )"

            if [ -n "$NODE_BIN" ]; then
              NODE_DIR="$(dirname "$NODE_BIN")"
              echo "$NODE_DIR" >> "$GITHUB_PATH"
              export PATH="$NODE_DIR:$PATH"
            fi
          fi

          node --version
          npm --version
          node -e 'const min = [20, 18, 1]; const got = process.versions.node.split(".").map(Number); const ok = got[0] > min[0] || (got[0] === min[0] && (got[1] > min[1] || (got[1] === min[1] && got[2] >= min[2]))); if (!ok) { console.error(`Node.js >= ${min.join(".")} is required; found ${process.versions.node}`); process.exit(1); }'

      - name: Install dependencies
        working-directory: OWD-figma-api-snapshot-master
        run: npm ci

      - name: Run crawler
        working-directory: OWD-figma-api-snapshot-master
        run: npm run build

      - name: Commit and push updated dataset
        id: commit
        working-directory: OWD-figma-api-snapshot-master
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add out/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            TOTAL=$(node -e "const idx=JSON.parse(require('fs').readFileSync('./out/index.json','utf8')); console.log(idx.length)")
            git commit -m "chore: refresh dataset — ${TOTAL} pages total [$(date -u +%Y-%m-%d)]"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump minor version
        id: bump
        if: steps.commit.outputs.changed == 'true'
        working-directory: OWD-figma-api-snapshot-master
        run: |
          npm version minor --no-git-tag-version
          NEW_VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          git add package.json package-lock.json
          git commit -m "chore: bump version to v${NEW_VERSION}"

      - name: Push commits and tag
        if: steps.commit.outputs.changed == 'true'
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" != refs/heads/* ]]; then
            echo "Refusing to push from non-branch ref: $GITHUB_REF"
            exit 1
          fi

          VERSION=${{ steps.bump.outputs.version }}
          git tag "v${VERSION}"
          git push origin "HEAD:${GITHUB_REF}" "refs/tags/v${VERSION}"

      - name: Create GitHub Release
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          set -euo pipefail

          NOTES_FILE="${RUNNER_TEMP}/release-notes.md"
          {
            echo "Automated dataset refresh - ${VERSION}"
            echo
            echo "Crawled on $(date -u +%Y-%m-%d)."
          } > "$NOTES_FILE"

          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file "$NOTES_FILE"
