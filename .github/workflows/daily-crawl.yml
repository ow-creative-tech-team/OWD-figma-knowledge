name: Daily Figma Docs Crawl

on:
  schedule:
    # Runs every day at 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch: # allow manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: OWD-figma-api-snapshot-master/package-lock.json

      - name: Install dependencies
        working-directory: OWD-figma-api-snapshot-master
        run: npm ci

      - name: Run crawler
        working-directory: OWD-figma-api-snapshot-master
        run: npm run build

      - name: Commit and push updated dataset
        id: commit
        working-directory: OWD-figma-api-snapshot-master
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add out/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            TOTAL=$(node -e "const idx=JSON.parse(require('fs').readFileSync('./out/index.json','utf8')); console.log(idx.length)")
            git commit -m "chore: refresh dataset — ${TOTAL} pages total [$(date -u +%Y-%m-%d)]"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump minor version
        id: bump
        if: steps.commit.outputs.changed == 'true'
        working-directory: OWD-figma-api-snapshot-master
        run: |
          npm version minor --no-git-tag-version
          NEW_VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          git add package.json package-lock.json
          git commit -m "chore: bump version to v${NEW_VERSION}"

      - name: Push commits and tag
        if: steps.commit.outputs.changed == 'true'
        run: |
          VERSION=${{ steps.bump.outputs.version }}
          git tag "v${VERSION}"
          git push --follow-tags

      - name: Create GitHub Release
        if: steps.commit.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: v${{ steps.bump.outputs.version }}
          generate_release_notes: false
          body: |
            Automated dataset refresh — ${{ steps.bump.outputs.version }}

            Crawled on $(date -u +%Y-%m-%d).
